# =============================================================================
# File: ls_config.yaml
# Description: Physical parameters for the Main Influent Lift Station.
# Context: UIUC ENG 573 Capstone Project - Spring 2026
# =============================================================================

system:
  name: "Main_Influent_LS"
  type: "lift_station"

# -----------------------------------------------------------------------------
# 1. Storage (The "Sewer Battery")
# -----------------------------------------------------------------------------
storage:
  wet_well_diameter_ft: 10.0
  wet_well_area_sqft: 78.54     # pi * r^2
  
  # Operating Envelopes (Regulatory & Safety)
  min_level_ft: 2.0             # Pump prime protection (Floor)
  max_level_ft: 10.0            # High Level Alarm (Avoid SSOs)
  initial_level_ft: 5.0
  overflow_level_ft: 14.0       # Physical top of manhole (Spill Point)

# -----------------------------------------------------------------------------
# 2. Pumping Assets (15HP Submersibles)
# -----------------------------------------------------------------------------
pumps:
  influent_pumps:
    description: "Submersible non-clog pumps (See IMG_3485)"
    count: 3
    motor_hp: 15.0
    rated_kw: 11.2              # Standard 15HP draw
    design_flow_gpm: 400.0      # Per pump @ design head
    motor_efficiency: 0.91